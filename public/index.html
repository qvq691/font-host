<html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字体托管</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-weight: 500;
    }
    .upload-area {
      background: white;
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      margin-bottom: 30px;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #666; }
    .upload-area input[type="file"] { display: none; }
    .upload-btn {
      background: #333;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }
    .upload-btn:hover { background: #555; }

    /* 上传进度 */
    .upload-progress {
      display: none;
      margin-top: 20px;
      text-align: left;
    }
    .upload-progress.show { display: block; }
    .progress-info {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      background: #eee;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar {
      background: #333;
      height: 100%;
      width: 0%;
      transition: width 0.1s;
    }

    .font-list {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .font-item {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
    }
    .font-item:last-child { border-bottom: none; }
    .font-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .font-info { flex: 1; }
    .font-name {
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }
    .font-size {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    .font-actions { display: flex; gap: 8px; }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-copy { background: #e8f4e8; color: #2d7d2d; }
    .btn-delete { background: #fbe8e8; color: #c53030; }
    .btn:hover { opacity: 0.8; }

    /* 字体预览 */
    .font-preview {
      margin-top: 8px;
      padding: 6px 8px;
      background: #fafafa;
      border-radius: 4px;
      font-size: 8px;
      line-height: 1.4;
      color: #333;
      word-break: break-all;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      display: none;
      z-index: 999;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>字体托管服务</h1>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <p style="margin-bottom: 15px; color: #666;">点击或拖拽上传字体文件</p>
      <p style="font-size: 13px; color: #999; margin-bottom: 20px;">支持 .ttf .otf .woff .woff2</p>
      <button class="upload-btn">选择文件</button>
      <input type="file" id="fileInput" accept=".ttf,.otf,.woff,.woff2" multiple>

      <div class="upload-progress" id="uploadProgress">
        <div class="progress-info" id="progressInfo">上传中...</div>
        <div class="progress-bar-bg">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>

    <div class="font-list" id="fontList">
      <div class="empty">暂无字体</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '';
    const PREVIEW_TEXT = '你好 123 Hello オハよ 안녕하세요';
    let fontCounter = 0;

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // 上传单个文件（带进度）
    function uploadFile(file, current, total) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        const formData = new FormData();
        formData.append('font', file);

        const progressEl = document.getElementById('uploadProgress');
        const progressInfo = document.getElementById('progressInfo');
        const progressBar = document.getElementById('progressBar');

        progressEl.classList.add('show');

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            progressInfo.textContent = `第 ${current} 个 / 共 ${total} 个 — ${percent}%`;
            progressBar.style.width = percent + '%';
          }
        };

        xhr.onload = () => {
          if (xhr.status === 200) {
            resolve(JSON.parse(xhr.responseText));
          } else {
            reject(new Error('上传失败'));
          }
        };

        xhr.onerror = () => reject(new Error('网络错误'));

        xhr.open('POST', API_BASE + '/api/upload');
        xhr.send(formData);
      });
    }

    // 加载字体列表
    async function loadFonts() {
      const res = await fetch(API_BASE + '/api/fonts');
      const fonts = await res.json();
      const list = document.getElementById('fontList');

      if (fonts.length === 0) {
        list.innerHTML = '<div class="empty">暂无字体</div>';
        return;
      }

      list.innerHTML = fonts.map((f, index) => {
        const fontId = 'font-preview-' + index;
        const fullUrl = window.location.origin + f.url;

        return `
          <div class="font-item">
            <div class="font-header">
              <div class="font-info">
                <div class="font-name">${f.name}</div>
                <div class="font-size">${formatSize(f.size)}</div>
              </div>
              <div class="font-actions">
                <button class="btn btn-copy" onclick="copyLink('${f.url}')">复制链接</button>
                <button class="btn btn-delete" onclick="deleteFont('${encodeURIComponent(f.name)}')">删除</button>
              </div>
            </div>
            <div class="font-preview" id="${fontId}" data-url="${fullUrl}" data-font-name="${f.name}">
              ${PREVIEW_TEXT}
            </div>
          </div>
        `;
      }).join('');

      // 加载每个字体预览
      fonts.forEach((f, index) => {
        loadFontPreview(index, f.name, window.location.origin + f.url);
      });
    }

    // 动态加载字体并应用预览
    function loadFontPreview(index, fontName, fontUrl) {
      const previewEl = document.getElementById('font-preview-' + index);
      if (!previewEl) return;

      const uniqueFontName = 'PreviewFont-' + fontCounter++;

      const style = document.createElement('style');
      style.textContent = `
        @font-face {
          font-family: '${uniqueFontName}';
          src: url('${fontUrl}');
          font-display: swap;
        }
      `;
      document.head.appendChild(style);

      // 等待字体加载
      const testSpan = document.createElement('span');
      testSpan.style.fontFamily = uniqueFontName;
      testSpan.style.position = 'absolute';
      testSpan.style.left = '-9999px';
      testSpan.textContent = 'test';
      document.body.appendChild(testSpan);

      setTimeout(() => {
        previewEl.style.fontFamily = `'${uniqueFontName}', sans-serif`;
        document.body.removeChild(testSpan);
      }, 300);
    }

    function copyLink(url) {
      const fullUrl = window.location.origin + url;
      navigator.clipboard.writeText(fullUrl).then(() => {
        showToast('链接已复制');
      });
    }

    async function deleteFont(name) {
      if (!confirm('确定删除这个字体吗？')) return;
      await fetch(API_BASE + '/api/fonts/' + name, { method: 'DELETE' });
      showToast('已删除');
      loadFonts();
    }

    // 上传处理
    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if (files.length === 0) return;

      const progressEl = document.getElementById('uploadProgress');
      const progressBar = document.getElementById('progressBar');

      for (let i = 0; i < files.length; i++) {
        await uploadFile(files[i], i + 1, files.length);
      }

      progressEl.classList.remove('show');
      progressBar.style.width = '0%';
      showToast('上传完成');
      loadFonts();
      e.target.value = '';
    });

    loadFonts();
  </script>
</body>
</html>
