apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Font Host
  description: 字体托管服务 - 上传、管理字体并生成可用于CSS的链接
  icon: https://api.iconify.design/mdi:format-font.svg
  coverImage: https://api.iconify.design/mdi:format-font.svg
  tags:
    - Tool
    - Storage
spec:
  services:
    - name: font-host
      icon: https://api.iconify.design/mdi:format-font.svg
      template: GIT
      source:
        repoURL: https://github.com/ZZZa-o/font-host
        branch: main
      ports:
        - id: web
          port: 8080
          type: HTTP
      volumes:
        - id: fonts
          dir: /app/fonts
      env:
        FONT_DIR:
          default: /app/fonts
          expose: false
